name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Validate tag matches extension version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(sed -n 's:.*<version>\([^<]*\)</version>.*:\1:p' minifier.xml | head -1)

          if [[ -z "$MANIFEST_VERSION" ]]; then
            echo "Could not read version from minifier.xml"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match minifier.xml version ${MANIFEST_VERSION}"
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Prepare update server manifest
        run: |
          git fetch origin main
          if git show origin/main:updates/plg_system_minifier.xml > updates/plg_system_minifier.xml 2>/dev/null; then
            echo "Loaded existing update server manifest from main"
          else
            echo "No existing update server manifest on main"
          fi

      - name: Build release package
        run: ./build.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

      - name: Publish update server manifest on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp updates/plg_system_minifier.xml /tmp/plg_system_minifier.xml

          git fetch origin main
          git checkout main
          cp /tmp/plg_system_minifier.xml updates/plg_system_minifier.xml

          if git diff --quiet -- updates/plg_system_minifier.xml; then
            echo "Update server manifest already up to date on main"
            exit 0
          fi

          git add updates/plg_system_minifier.xml
          git commit -m "Add release manifest entry for ${GITHUB_REF_NAME}"
          git push origin main
